services:
  - type: web
    name: shynlimoveoutcleaning
    runtime: static
    repo: https://github.com/miralitys/shynlimoveoutcleaning.git
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    domains:
      - shynlimoveoutcleaning.com
      - www.shynlimoveoutcleaning.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=300, s-maxage=86400, stale-while-revalidate=604800
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
