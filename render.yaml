services:
  - type: web
    name: shynlimoveoutcleaning
    runtime: static
    repo: https://github.com/miralitys/shynlimoveoutcleaning.git
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    domains:
      - shynlimoveoutcleaning.com
      - www.shynlimoveoutcleaning.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
